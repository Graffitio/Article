  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1A1A2E; --paper: #F8F9FA; --warm-mid: #A8BDD4;
      --accent: #5B7FA6; --accent2: #2B2D42; --rule: #DDE3EA;
      --serif: 'Noto Serif KR', serif; --mono: 'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper); color: var(--ink);
      font-family: var(--serif); line-height: 1.9;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: 0.6;
    }
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 0 2rem; }

    /* ── HEADER ── */
    header { padding: 4rem 0 0; position: relative; }
    .kicker {
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); display: block; margin-bottom: 1.8rem;
    }
    .headline {
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 700;
      line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 0.4rem;
    }
    .headline em {
      font-style: normal; color: var(--accent); position: relative;
    }
    .headline em::after {
      content: ''; position: absolute;
      left: 0; bottom: 2px; width: 100%; height: 3px;
      background: var(--accent); opacity: 0.3;
    }

      font-family: var(--mono); font-size: 0.72rem; line-height: 1.6;
      color: #5B6A7E; margin: 1.6rem 0 2rem;
